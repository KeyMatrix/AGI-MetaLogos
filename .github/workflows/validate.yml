name: Validate

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Generate control snapshots
        run: |
          python scripts/generate_control_snapshots.py --mode validate

      - name: Validate artifact sync schema
        run: |
          python scripts/validate_artifact_sync.py

      - name: Validate JSON manifests
        run: |
          node -e "JSON.parse(require('fs').readFileSync('artifact_sync.json', 'utf8')); JSON.parse(require('fs').readFileSync('docs/architecture/keymatrix-master-blueprint.json', 'utf8')); JSON.parse(require('fs').readFileSync('docs/architecture/platform-contract.json', 'utf8')); JSON.parse(require('fs').readFileSync('system/module_registry.json', 'utf8')); JSON.parse(require('fs').readFileSync('docs/control/data/module-registry.json', 'utf8')); JSON.parse(require('fs').readFileSync('docs/control/data/config-summary.json', 'utf8')); JSON.parse(require('fs').readFileSync('docs/control/data/archive-summary.json', 'utf8')); JSON.parse(require('fs').readFileSync('docs/control/data/telemetry-history.json', 'utf8')); JSON.parse(require('fs').readFileSync('docs/control/data/actions-catalog.json', 'utf8')); console.log('json validation ok')"

      - name: Check canonical docs paths
        run: |
          test -f docs/index.html
          test -f docs/css/style.css
          test -f docs/js/init.js
          test -f docs/assets/om-symbol.svg
          test -f docs/coremap_with_links.svg
          test -f docs/control/index.html
          test -f docs/control/v3/index.html

      - name: Check normalized config paths
        run: |
          test -f config/artifact_sync.json || true
          test -f config/awakening-seed.json || true
          test -f config/flow.json || true

      - name: Upload generated control snapshots
        uses: actions/upload-artifact@v4
        with:
          name: control-snapshots-validate
          path: docs/control/data/*.json
