name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate control snapshots
        run: |
          python scripts/generate_control_snapshots.py --mode deploy

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Validate docs payload
        run: |
          test -f docs/index.html
          test -f docs/css/style.css
          test -f docs/js/init.js
          test -f docs/assets/om-symbol.svg
          test -f docs/coremap_with_links.svg
          test -f docs/control/index.html
          test -f docs/control/data/module-registry.json
          test -f docs/control/data/config-summary.json
          test -f docs/control/data/archive-summary.json
          test -f docs/control/data/telemetry-history.json
          test -f docs/control/data/actions-catalog.json

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy
        uses: actions/deploy-pages@v4
